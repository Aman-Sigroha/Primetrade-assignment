openapi: 3.0.3
info:
  title: PrimeTrade Assignment API
  version: 1.0.0
  description: |
    Versioned REST API (`/api/v1`) with JWT authentication and role-based access.
servers:
  - url: http://localhost:3000
    description: Local development
tags:
  - name: Auth
  - name: Tasks
paths:
  /api/v1/auth/request-otp:
    post:
      tags: [Auth]
      summary: Request email OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: OTP sent (or returned in dev mode)
        "409":
          description: Email already registered
  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and get verification token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  example: "123456"
      responses:
        "200":
          description: Email verified
        "400":
          description: Invalid/expired OTP
        "404":
          description: OTP request not found
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, verificationToken]
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                verificationToken:
                  type: string
      responses:
        "201":
          description: Created
        "400":
          description: Validation error
        "401":
          description: Invalid verification token
        "409":
          description: Email already registered
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: OK
        "401":
          description: Invalid credentials
  /api/v1/tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      description: |
        Users see their own tasks. Admins see all tasks (optional `userId` query filter).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: userId
          schema:
            type: string
          description: Admin only — filter by owner ObjectId
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (user attempted foreign userId filter)
    post:
      tags: [Tasks]
      summary: Create task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        "201":
          description: Created
        "400":
          description: Validation error
        "401":
          description: Unauthorized
  /api/v1/tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get task by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Not found
    put:
      tags: [Tasks]
      summary: Update task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: OK
        "403":
          description: Forbidden
        "404":
          description: Not found
    delete:
      tags: [Tasks]
      summary: Delete task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "403":
          description: Forbidden
        "404":
          description: Not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
